<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, follow">
<title>Smart Fellow</title>
<script>
(function () {
  var saved = null;
  try { saved = localStorage.getItem('sf-lang'); } catch (e) {}
  var browser = (navigator.language || navigator.userLanguage || '').toLowerCase();
  var locale = saved || (browser.indexOf('ko') === 0 ? 'ko' : browser.indexOf('fr') === 0 ? 'fr' : 'en');
  window.location.replace('/' + locale + '/use-cases/');
})();
</script>
<noscript><meta http-equiv="refresh" content="0; url=/en/use-cases/"></noscript>
</head>
<body></body>
</html>
